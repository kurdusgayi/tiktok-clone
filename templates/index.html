<!DOCTYPE html>
<html lang="ku">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Clone</title>
    <style>
        body { margin: 0; background: black; color: white; text-align: center; font-family: sans-serif; }
        .nav { padding: 15px; font-size: 20px; }
        video { width: 100%; height: 80vh; object-fit: cover; }
        .actions { display: flex; justify-content: space-around; padding: 20px; }
    </style>
</head>
<body>
    <div class="nav">
        {% if username %} <span>سڵاو، {{ username }}</span> {% else %} <a href="/signup" style="color:white;">Login</a> {% endif %}
    </div>
    <video src="/static/video.mp4" autoplay loop muted playsinline></video>
    <div class="actions">
        <span>❤️ Like</span> <span>💬 Comment</span>
    </div>
</body>
</html>
