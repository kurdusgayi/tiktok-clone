<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Clone</title>
    <style>
        body { margin: 0; background-color: black; color: white; display: flex; justify-content: center; }
        .video-container { width: 100%; max-width: 400px; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-slide { width: 100%; height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="video-slide">
            <h1>ڤیدیۆیێن من</h1>
        </div>
        <div class="video-slide">
            <h1>ڤیدیۆیا دووێ</h1>
        </div>
    </div>

</body>
</html>
