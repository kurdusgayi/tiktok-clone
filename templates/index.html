<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Clone</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <style>
        body { margin: 0; background: black; color: white; font-family: sans-serif; overflow: hidden; }
        .video-container { height: 100vh; width: 100%; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* دیزاینا دوگمه‌یێن لایێ راستێ */
        .sidebar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; text-align: center; }
        .icon { font-size: 30px; cursor: pointer; }
        .count { font-size: 12px; margin-top: 5px; }

        /* دیزاینا پشکێن خوارێ */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="video-container">
    <video src="/static/video.mp4" autoplay loop muted playsinline></video>

    <div class="sidebar">
        <div class="icon" onclick="alert('Liked!')">❤️<div class="count">2.4M</div></div>
        <div class="icon" onclick="alert('Comment!')">💬<div class="count">120</div></div>
        <div class="icon">↗️</div>
    </div>

    <div class="bottom-nav">
        <span>🏠 Home</span>
        <span>🔍 Discover</span>
        <span>➕ Upload</span>
        <span>👤 Profile</span>
    </div>
</div>

</body>
</html>
